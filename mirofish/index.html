<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiroFish — AI Swarm Simulation</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --accent3: #f78166;
    --text: #e6edf3;
    --muted: #8b949e;
    --card-bg: #1c2128;
    --twitter: #1d9bf0;
    --reddit: #ff4500;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 14px; line-height: 1.6; }

  /* Nav */
  header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; align-items: center; gap: 32px; height: 52px; position: sticky; top: 0; z-index: 100; }
  .logo { font-weight: 700; font-size: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .logo span { color: var(--accent); }
  nav { display: flex; gap: 4px; }
  .tab-btn { background: none; border: none; color: var(--muted); padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; }
  .tab-btn:hover { color: var(--text); background: rgba(255,255,255,.05); }
  .tab-btn.active { color: var(--text); background: rgba(88,166,255,.15); border: 1px solid rgba(88,166,255,.3); }

  /* Hero */
  .hero { padding: 28px 24px 20px; border-bottom: 1px solid var(--border); }
  .hero-question { font-size: 18px; font-weight: 600; color: var(--text); margin-bottom: 16px; padding: 14px 18px; background: var(--card-bg); border-left: 3px solid var(--accent); border-radius: 6px; }
  .stats { display: flex; flex-wrap: wrap; gap: 10px; }
  .stat-chip { background: var(--card-bg); border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: 12px; color: var(--muted); }
  .stat-chip strong { color: var(--text); }

  /* Tabs */
  .tab-panel { display: none; padding: 24px; max-width: 900px; margin: 0 auto; }
  .tab-panel.active { display: block; }

  /* Report layout */
  .report-layout { display: grid; grid-template-columns: 220px 1fr; gap: 24px; align-items: start; }
  .report-sidebar { position: sticky; top: 68px; }
  .section-nav { display: flex; flex-direction: column; gap: 4px; }
  .sec-btn {
    background: none; border: none; color: var(--muted);
    padding: 9px 12px; border-radius: 6px; cursor: pointer;
    font-size: 13px; text-align: left; transition: all 0.15s;
    display: flex; align-items: flex-start; gap: 10px; line-height: 1.4;
    border-left: 2px solid transparent;
  }
  .sec-btn:hover { color: var(--text); background: rgba(255,255,255,.04); }
  .sec-btn.active { color: var(--accent); background: rgba(88,166,255,.06); border-left-color: var(--accent); }
  .sec-num { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; padding-top: 1px; flex-shrink: 0; }
  .sec-btn.active .sec-num { color: var(--accent); }
  .sec-btn.all-btn { margin-top: 8px; border-top: 1px solid var(--border); padding-top: 12px; font-size: 12px; color: var(--muted); }
  .sec-btn.all-btn:hover { color: var(--text); }

  /* Report content */
  .report-summary {
    background: rgba(63,185,80,.07); border: 1px solid rgba(63,185,80,.2);
    border-radius: 8px; padding: 16px 20px; margin-bottom: 24px; color: #cdd9e5; font-size: 14px; line-height: 1.7;
  }
  .report-summary strong { color: var(--accent2); display: block; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.6px; }
  .report-content {
    background: var(--card-bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 32px 36px;
  }
  .report-content h2 {
    color: var(--text); font-size: 19px; font-weight: 700;
    margin: 0 0 20px; padding-bottom: 12px;
    border-bottom: 1px solid var(--border); line-height: 1.35;
  }
  .report-content h3 {
    color: var(--accent); font-size: 13px; font-weight: 600;
    margin: 28px 0 10px; text-transform: uppercase; letter-spacing: 0.5px;
  }
  .report-content p { color: #cdd9e5; font-size: 15px; line-height: 1.85; margin-bottom: 16px; }
  .report-content strong { color: var(--text); }
  .report-content em { color: #b7c0cb; font-style: italic; }
  .report-content ul, .report-content ol { padding-left: 22px; margin-bottom: 16px; color: #cdd9e5; }
  .report-content li { font-size: 15px; line-height: 1.8; margin-bottom: 5px; }
  .report-content blockquote {
    border-left: 3px solid rgba(88,166,255,.5); padding: 12px 18px;
    background: rgba(88,166,255,.05); border-radius: 0 6px 6px 0;
    color: #adbac7; margin: 20px 0; font-style: italic; font-size: 14px; line-height: 1.75;
  }
  .report-content hr { border: none; border-top: 1px solid var(--border); margin: 32px 0; }

  @media (max-width: 760px) {
    .report-layout { grid-template-columns: 1fr; }
    .report-sidebar { position: static; }
    .section-nav { flex-direction: row; flex-wrap: wrap; gap: 6px; }
    .sec-btn { border-left: none; border-bottom: 2px solid transparent; padding: 6px 10px; font-size: 12px; }
    .sec-btn.active { border-bottom-color: var(--accent); border-left: none; }
    .sec-btn.all-btn { margin-top: 0; border-top: none; padding-top: 6px; }
    .report-content { padding: 20px; }
  }

  /* Feed */
  .feed-subtabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .subtab-btn { background: var(--card-bg); border: 1px solid var(--border); color: var(--muted); padding: 7px 16px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.15s; display: flex; align-items: center; gap: 6px; }
  .subtab-btn:hover { color: var(--text); }
  .subtab-btn.active.twitter { color: var(--twitter); border-color: var(--twitter); background: rgba(29,155,240,.08); }
  .subtab-btn.active.reddit { color: var(--reddit); border-color: var(--reddit); background: rgba(255,69,0,.08); }
  .platform-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .platform-dot.twitter { background: var(--twitter); }
  .platform-dot.reddit { background: var(--reddit); }

  .search-bar { width: 100%; background: var(--card-bg); border: 1px solid var(--border); border-radius: 6px; padding: 8px 14px; color: var(--text); font-size: 13px; margin-bottom: 16px; outline: none; }
  .search-bar:focus { border-color: var(--accent); }
  .search-bar::placeholder { color: var(--muted); }

  .chart-wrap { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 20px; }
  .chart-wrap h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
  .chart-wrap canvas { max-height: 160px; }

  /* Post cards */
  .post-list { display: flex; flex-direction: column; gap: 12px; }
  .post-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; padding: 16px; transition: border-color 0.15s; }
  .post-card:hover { border-color: #484f58; }
  .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
  .avatar.twitter-av { background: rgba(29,155,240,.2); color: var(--twitter); }
  .avatar.reddit-av { background: rgba(255,69,0,.2); color: var(--reddit); }
  .post-author { flex: 1; min-width: 0; }
  .post-author-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .post-author-handle { font-size: 12px; color: var(--muted); }
  .post-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .post-content { color: #cdd9e5; font-size: 13px; line-height: 1.65; }
  .post-stats { margin-top: 10px; display: flex; gap: 16px; }
  .post-stat { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 4px; }
  .post-stat.pos { color: var(--accent2); }
  .post-stat.neg { color: var(--accent3); }

  /* Comments */
  .comments-toggle { margin-top: 10px; background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 5px; padding: 4px 10px; font-size: 12px; cursor: pointer; transition: all 0.15s; }
  .comments-toggle:hover { color: var(--text); border-color: #484f58; }
  .comments-section { margin-top: 12px; border-top: 1px solid var(--border); padding-top: 12px; display: none; }
  .comments-section.open { display: block; }
  .comment-item { display: flex; gap: 8px; margin-bottom: 10px; }
  .comment-av { width: 24px; height: 24px; border-radius: 50%; background: rgba(255,69,0,.15); color: var(--reddit); display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 700; flex-shrink: 0; }
  .comment-body { flex: 1; min-width: 0; }
  .comment-name { font-size: 12px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .comment-text { font-size: 12px; color: #adbac7; line-height: 1.5; }
  .comment-meta { font-size: 11px; color: var(--muted); margin-top: 3px; }

  /* No results */
  .empty { text-align: center; color: var(--muted); padding: 40px 0; font-size: 13px; }

  /* Loading */
  #loading { text-align: center; padding: 80px 24px; color: var(--muted); }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; margin-bottom: 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    .stats { gap: 6px; }
    header { padding: 0 12px; gap: 16px; }
    .tab-panel { padding: 16px 12px; }
    .hero { padding: 16px 12px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">&#x1F41F; <span>MiroFish</span></div>
  <nav>
    <button class="tab-btn active" data-tab="report">Report</button>
    <button class="tab-btn" data-tab="feed">Agent Feed</button>
  </nav>
</header>

<div class="hero">
  <div class="hero-question" id="hero-question">Loading simulation data&hellip;</div>
  <div class="stats" id="hero-stats"></div>
</div>

<div id="loading">
  <div class="spinner"></div><br>Loading data&hellip;
</div>

<!-- REPORT TAB -->
<div class="tab-panel" id="tab-report">
  <div class="report-summary" id="report-summary"></div>
  <div class="report-layout">
    <aside class="report-sidebar">
      <div class="section-nav" id="section-nav"></div>
    </aside>
    <div class="report-content" id="report-content"></div>
  </div>
</div>

<!-- FEED TAB -->
<div class="tab-panel" id="tab-feed">
  <div class="feed-subtabs">
    <button class="subtab-btn active twitter" data-feed="twitter">
      <span class="platform-dot twitter"></span> Twitter <span id="tw-count"></span>
    </button>
    <button class="subtab-btn reddit" data-feed="reddit">
      <span class="platform-dot reddit"></span> Reddit <span id="rd-count"></span>
    </button>
  </div>
  <input class="search-bar" id="feed-search" type="text" placeholder="Search by agent name&hellip;">
  <div class="chart-wrap" id="chart-wrap">
    <h3>Action distribution</h3>
    <canvas id="action-chart"></canvas>
  </div>
  <div class="post-list" id="post-list"></div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
var appData = {};
var currentFeed = 'twitter';
var chartInstance = null;
var chartPlatform = null;

// ── Boot ──────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  Promise.all([
    fetch('data/meta.json').then(function(r) { return r.json(); }),
    fetch('data/feed.json').then(function(r) { return r.json(); }),
    fetch('data/report.json').then(function(r) { return r.json(); })
  ]).then(function(results) {
    var meta = results[0], feed = results[1], report = results[2];
    appData = { meta: meta, feed: feed, report: report };
    document.getElementById('loading').style.display = 'none';
    renderHero(meta);
    renderReport(report);
    renderFeed(feed, 'twitter');
    document.getElementById('tab-report').classList.add('active');
    document.getElementById('tw-count').textContent = '(' + feed.twitter.length + ')';
    document.getElementById('rd-count').textContent = '(' + feed.reddit.length + ')';
  }).catch(function(err) {
    document.getElementById('loading').innerHTML =
      '<p style="color:#f78166">Failed to load data. Run the export script first, or serve via HTTP (not file://).</p>';
    console.error(err);
  });

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      btn.classList.add('active');
      document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    });
  });

  // Feed subtabs
  document.querySelectorAll('.subtab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.subtab-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      currentFeed = btn.dataset.feed;
      document.getElementById('feed-search').value = '';
      if (appData.feed) renderFeed(appData.feed, currentFeed);
    });
  });

  // Search
  document.getElementById('feed-search').addEventListener('input', function(e) {
    if (appData.feed) renderPostList(appData.feed[currentFeed], e.target.value.trim().toLowerCase());
  });
});

// ── Hero ──────────────────────────────────────────────────────────────────────
function renderHero(meta) {
  document.getElementById('hero-question').textContent = meta.simulation_question || '';
  var chips = [
    { label: 'Agents', val: meta.agents_count },
    { label: 'Sim Hours', val: meta.total_hours },
    { label: 'Twitter Posts', val: meta.twitter_posts },
    { label: 'Reddit Posts', val: meta.reddit_posts },
    { label: 'Comments', val: meta.reddit_comments },
    { label: 'Total Actions', val: meta.total_actions }
  ];
  document.getElementById('hero-stats').innerHTML = chips.map(function(c) {
    return '<span class="stat-chip"><strong>' + c.val + '</strong> ' + c.label + '</span>';
  }).join('');
}

// ── Report ────────────────────────────────────────────────────────────────────
function renderReport(report) {
  var summaryEl = document.getElementById('report-summary');
  summaryEl.innerHTML = '<strong>Summary</strong>' + escHtml(report.summary || '');

  var navEl = document.getElementById('section-nav');
  var sections = report.sections || [];

  var sectionBtns = sections.map(function(s, i) {
    return '<button class="sec-btn' + (i === 0 ? ' active' : '') + '" data-idx="' + i + '">' +
      '<span class="sec-num">' + (i + 1) + '</span>' +
      escHtml(s.title || ('Section ' + (i+1))) +
      '</button>';
  }).join('');
  navEl.innerHTML = sectionBtns + '<button class="sec-btn all-btn" data-idx="all">&#x2630; View All</button>';

  function showSection(idx) {
    navEl.querySelectorAll('.sec-btn').forEach(function(b) { b.classList.remove('active'); });
    var activeBtn = navEl.querySelector('[data-idx="' + idx + '"]');
    if (activeBtn) activeBtn.classList.add('active');
    var md = '';
    if (idx === 'all') {
      md = sections.map(function(s) { return s.content; }).join('\n\n---\n\n');
    } else {
      var s = sections[parseInt(idx)];
      md = s ? s.content : '';
    }
    var contentEl = document.getElementById('report-content');
    contentEl.innerHTML = DOMPurify.sanitize(marked.parse(md));
    contentEl.scrollTop = 0;
  }

  navEl.addEventListener('click', function(e) {
    var btn = e.target.closest('.sec-btn');
    if (btn) showSection(btn.dataset.idx);
  });

  if (sections.length > 0) showSection(0);
}

// ── Feed ──────────────────────────────────────────────────────────────────────
function renderFeed(feed, platform) {
  currentFeed = platform;
  renderActionChart(platform);
  renderPostList(feed[platform], '');
}

function renderPostList(posts, query) {
  var filtered = query
    ? posts.filter(function(p) { return p.agent_name.toLowerCase().indexOf(query) !== -1; })
    : posts;

  var el = document.getElementById('post-list');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="empty">No posts found.</div>';
    return;
  }
  el.innerHTML = filtered.map(function(p) { return renderPostCard(p, currentFeed); }).join('');

  // Attach comment toggles
  el.querySelectorAll('.comments-toggle').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var section = btn.nextElementSibling;
      var open = section.classList.toggle('open');
      btn.textContent = open
        ? 'Hide comments'
        : btn.dataset.count + ' comment' + (btn.dataset.count != 1 ? 's' : '');
    });
  });
}

function renderPostCard(post, platform) {
  var initials = (post.agent_name || '?').slice(0, 2).toUpperCase();
  var avClass = platform === 'twitter' ? 'twitter-av' : 'reddit-av';
  var time = formatTime(post.created_at);

  var statsHtml = '';
  if (platform === 'reddit') {
    statsHtml = '<div class="post-stats">' +
      '<span class="post-stat pos">&#x25B2; ' + (post.num_likes || 0) + '</span>' +
      '<span class="post-stat neg">&#x25BC; ' + (post.num_dislikes || 0) + '</span>' +
      '<span class="post-stat">&#x1F4AC; ' + ((post.comments || []).length) + '</span>' +
      '</div>';
  } else if (post.num_likes > 0 || post.num_shares > 0) {
    statsHtml = '<div class="post-stats">' +
      (post.num_likes > 0 ? '<span class="post-stat pos">&#x2665; ' + post.num_likes + '</span>' : '') +
      (post.num_shares > 0 ? '<span class="post-stat">&#x21BA; ' + post.num_shares + '</span>' : '') +
      '</div>';
  }

  var commentsHtml = '';
  if (platform === 'reddit' && post.comments && post.comments.length > 0) {
    var count = post.comments.length;
    var items = post.comments.map(function(c) {
      var ci = (c.agent_name || '?').slice(0, 2).toUpperCase();
      return '<div class="comment-item">' +
        '<div class="comment-av">' + ci + '</div>' +
        '<div class="comment-body">' +
        '<div class="comment-name">' + escHtml(c.agent_name) + ' <span style="color:var(--muted);font-weight:400">@' + escHtml(c.username) + '</span></div>' +
        '<div class="comment-text">' + escHtml(c.content) + '</div>' +
        '<div class="comment-meta">' + formatTime(c.created_at) + (c.num_likes ? ' &middot; &#x25B2; ' + c.num_likes : '') + '</div>' +
        '</div></div>';
    }).join('');
    commentsHtml = '<button class="comments-toggle" data-count="' + count + '">' + count + ' comment' + (count !== 1 ? 's' : '') + '</button>' +
      '<div class="comments-section">' + items + '</div>';
  }

  return '<div class="post-card">' +
    '<div class="post-header">' +
    '<div class="avatar ' + avClass + '">' + initials + '</div>' +
    '<div class="post-author">' +
    '<div class="post-author-name">' + escHtml(post.agent_name) + '</div>' +
    '<div class="post-author-handle">@' + escHtml(post.username) + '</div>' +
    '</div>' +
    '<div class="post-time">' + time + '</div>' +
    '</div>' +
    '<div class="post-content">' + escHtml(post.content) + '</div>' +
    statsHtml + commentsHtml +
    '</div>';
}

// ── Chart ─────────────────────────────────────────────────────────────────────
function renderActionChart(platform) {
  if (!appData.meta) return;
  if (chartPlatform === platform) return;
  chartPlatform = platform;

  var key = platform === 'twitter' ? 'twitter_action_breakdown' : 'reddit_action_breakdown';
  var breakdown = (appData.meta[key] || []).filter(function(r) { return r.action !== 'do_nothing'; });
  var labels = breakdown.map(function(r) { return r.action.replace(/_/g, ' '); });
  var values = breakdown.map(function(r) { return r.n; });
  var color = platform === 'twitter' ? 'rgba(29,155,240,0.7)' : 'rgba(255,69,0,0.7)';

  var ctx = document.getElementById('action-chart').getContext('2d');
  if (chartInstance) chartInstance.destroy();
  chartInstance = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: labels,
      datasets: [{ data: values, backgroundColor: color, borderRadius: 4 }]
    },
    options: {
      indexAxis: 'y',
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: 'rgba(48,54,61,0.8)' }, ticks: { color: '#8b949e', font: { size: 11 } } },
        y: { grid: { display: false }, ticks: { color: '#cdd9e5', font: { size: 11 } } }
      }
    }
  });
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function formatTime(ts) {
  if (!ts) return '';
  try {
    var d = new Date(ts);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  } catch(e) { return ts; }
}
</script>
</body>
</html>

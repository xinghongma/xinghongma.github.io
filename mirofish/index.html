<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MiroFish — AI Swarm Simulation Report</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#30363d;--accent:#58a6ff;--accent2:#3fb950;--accent3:#f78166;--text:#e6edf3;--muted:#8b949e;--card-bg:#1c2128;--twitter:#1d9bf0;--reddit:#ff4500}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.6}
/* Nav */
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:32px;height:52px;position:sticky;top:0;z-index:100}
.logo{font-weight:700;font-size:16px;color:var(--text);display:flex;align-items:center;gap:8px}
.logo span{color:var(--accent)}
nav{display:flex;gap:4px}
.tab-btn{background:none;border:none;color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s}
.tab-btn:hover{color:var(--text);background:rgba(255,255,255,.05)}
.tab-btn.active{color:var(--text);background:rgba(88,166,255,.15);border:1px solid rgba(88,166,255,.3)}
/* Hero */
.hero{padding:28px 24px 20px;border-bottom:1px solid var(--border)}
.hero-question{font-size:18px;font-weight:600;color:var(--text);margin-bottom:16px;padding:14px 18px;background:var(--card-bg);border-left:3px solid var(--accent);border-radius:6px}
.stats{display:flex;flex-wrap:wrap;gap:10px}
.stat-chip{background:var(--card-bg);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:12px;color:var(--muted)}
.stat-chip strong{color:var(--text)}
/* Tabs */
.tab-panel{display:none;padding:24px;max-width:960px;margin:0 auto}
.tab-panel.active{display:block}
/* Report layout */
.report-layout{display:grid;grid-template-columns:220px 1fr;gap:24px;align-items:start}
.report-sidebar{position:sticky;top:68px}
.section-nav{display:flex;flex-direction:column;gap:4px}
.sec-btn{background:none;border:none;color:var(--muted);padding:9px 12px;border-radius:6px;cursor:pointer;font-size:13px;text-align:left;transition:all .15s;display:flex;align-items:flex-start;gap:10px;line-height:1.4;border-left:2px solid transparent;width:100%}
.sec-btn:hover{color:var(--text);background:rgba(255,255,255,.04)}
.sec-btn.active{color:var(--accent);background:rgba(88,166,255,.06);border-left-color:var(--accent)}
.sec-num{font-size:11px;color:var(--muted);padding-top:1px;flex-shrink:0}
.sec-btn.active .sec-num{color:var(--accent)}
.sec-btn.all-btn{margin-top:8px;border-top:1px solid var(--border);padding-top:12px;font-size:12px}
/* Report content */
.report-summary{background:rgba(63,185,80,.07);border:1px solid rgba(63,185,80,.2);border-radius:8px;padding:16px 20px;margin-bottom:24px;color:#cdd9e5;font-size:14px;line-height:1.7}
.report-summary strong{color:var(--accent2);display:block;margin-bottom:8px;font-size:11px;text-transform:uppercase;letter-spacing:.6px}
.report-content{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:32px 36px}
.report-content h2{color:var(--text);font-size:19px;font-weight:700;margin:0 0 20px;padding-bottom:12px;border-bottom:1px solid var(--border);line-height:1.35}
.report-content h3{color:var(--accent);font-size:13px;font-weight:600;margin:28px 0 10px;text-transform:uppercase;letter-spacing:.5px}
.report-content p{color:#cdd9e5;font-size:15px;line-height:1.85;margin-bottom:16px}
.report-content strong{color:var(--text)}
.report-content em{color:#b7c0cb;font-style:italic}
.report-content ul,.report-content ol{padding-left:22px;margin-bottom:16px;color:#cdd9e5}
.report-content li{font-size:15px;line-height:1.8;margin-bottom:5px}
.report-content blockquote{border-left:3px solid rgba(88,166,255,.5);padding:12px 18px;background:rgba(88,166,255,.05);border-radius:0 6px 6px 0;color:#adbac7;margin:20px 0;font-style:italic;font-size:14px;line-height:1.75}
.report-content hr{border:none;border-top:1px solid var(--border);margin:32px 0}
/* Feed */
.feed-subtabs{display:flex;gap:8px;margin-bottom:20px}
.subtab-btn{background:var(--card-bg);border:1px solid var(--border);color:var(--muted);padding:7px 16px;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:all .15s;display:flex;align-items:center;gap:6px}
.subtab-btn:hover{color:var(--text)}
.subtab-btn.active.twitter{color:var(--twitter);border-color:var(--twitter);background:rgba(29,155,240,.08)}
.subtab-btn.active.reddit{color:var(--reddit);border-color:var(--reddit);background:rgba(255,69,0,.08)}
.platform-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.platform-dot.twitter{background:var(--twitter)}
.platform-dot.reddit{background:var(--reddit)}
.search-bar{width:100%;background:var(--card-bg);border:1px solid var(--border);border-radius:6px;padding:8px 14px;color:var(--text);font-size:13px;margin-bottom:16px;outline:none}
.search-bar:focus{border-color:var(--accent)}
.search-bar::placeholder{color:var(--muted)}
.chart-wrap{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
.chart-wrap h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.chart-wrap canvas{max-height:160px}
.post-list{display:flex;flex-direction:column;gap:12px}
.post-card{background:var(--card-bg);border:1px solid var(--border);border-radius:8px;padding:16px;transition:border-color .15s}
.post-card:hover{border-color:#484f58}
.post-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.avatar{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.avatar.twitter-av{background:rgba(29,155,240,.2);color:var(--twitter)}
.avatar.reddit-av{background:rgba(255,69,0,.2);color:var(--reddit)}
.post-author{flex:1;min-width:0}
.post-author-name{font-weight:600;font-size:13px;color:var(--text)}
.post-author-handle{font-size:12px;color:var(--muted)}
.post-time{font-size:11px;color:var(--muted);flex-shrink:0}
.post-content{color:#cdd9e5;font-size:13px;line-height:1.65}
.post-stats{margin-top:10px;display:flex;gap:16px}
.post-stat{font-size:12px;color:var(--muted);display:flex;align-items:center;gap:4px}
.post-stat.pos{color:var(--accent2)}
.post-stat.neg{color:var(--accent3)}
.comments-toggle{margin-top:10px;background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .15s}
.comments-toggle:hover{color:var(--text);border-color:#484f58}
.comments-section{margin-top:12px;border-top:1px solid var(--border);padding-top:12px;display:none}
.comments-section.open{display:block}
.comment-item{display:flex;gap:8px;margin-bottom:10px}
.comment-av{width:24px;height:24px;border-radius:50%;background:rgba(255,69,0,.15);color:var(--reddit);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.comment-body{flex:1;min-width:0}
.comment-name{font-size:12px;font-weight:600;color:var(--text);margin-bottom:2px}
.comment-text{font-size:12px;color:#adbac7;line-height:1.5}
.comment-meta{font-size:11px;color:var(--muted);margin-top:3px}
.empty{text-align:center;color:var(--muted);padding:40px 0;font-size:13px}
@media(max-width:760px){
  .report-layout{grid-template-columns:1fr}
  .report-sidebar{position:static}
  .section-nav{flex-direction:row;flex-wrap:wrap;gap:6px}
  .sec-btn{border-left:none;border-bottom:2px solid transparent;padding:6px 10px;font-size:12px;width:auto}
  .sec-btn.active{border-bottom-color:var(--accent);border-left:none}
  .sec-btn.all-btn{margin-top:0;border-top:none;padding-top:6px}
  .report-content{padding:20px}
  header{padding:0 12px;gap:16px}
  .tab-panel{padding:16px 12px}
  .hero{padding:16px 12px}
}
</style>
</head>

<header>
  <div class="logo">&#x1F41F; <span>MiroFish</span></div>

    <button class="tab-btn active" data-tab="report">Report</button>

<script>
var DATA_META={"simulation_id":"sim_9c94c59dbb5a","simulation_question":"What will the scenario be for the Republican Party in the 2026 midterm election?","total_hours":96,"agents_count":49,"total_actions":998,"twitter_posts":20,"twitter_actions":362,"twitter_action_breakdown":[{"action":"do_nothing","n":223},{"action":"interview","n":70},{"action":"sign_up","n":49},{"action":"create_post","n":20}],"reddit_posts":17,"reddit_comments":58,"reddit_actions":636,"reddit_action_breakdown":[{"action":"refresh","n":243},{"action":"like_post","n":99},{"action":"dislike_post","n":61},{"action":"create_comment","n":58},{"action":"interview","n":58},{"action":"sign_up","n":49},{"action":"like_comment","n":20},{"action":"create_post","n":17},{"action":"search_user","n":15},{"action":"search_posts","n":14},{"action":"do_nothing","n":2}],"report_id":"report_cef1b9f61666","report_title":"2026 Midterm Forecast: Republican Vulnerability Amid Geopolitical Fracture and Structural Erosion","report_summary":"The simulation predicts a structurally weakened Republican position in the 2026 midterms—driven not by a single scandal or economic shock, but by cascading intra-party division over foreign intervention, eroding base enthusiasm, and sustained Democratic financial and institutional advantage in competitive districts.","report_completed_at":"2026-03-26T14:29:57.544261","exported_at":"2026-03-26T17:49:25.374046"};
var DATA_REPORT={"title":"2026 Midterm Forecast: Republican Vulnerability Amid Geopolitical Fracture and Structural Erosion","summary":"The simulation predicts a structurally weakened Republican position in the 2026 midterms—driven not by a single scandal or economic shock, but by cascading intra-party division over foreign intervention, eroding base enthusiasm, and sustained Democratic financial and institutional advantage in competitive districts.","sections":[{"title":"Geopolitical Trigger Amplifies Internal Rifts","content":"## Geopolitical Trigger Amplifies Internal Rifts\n\n共和党内部围绕Operation Epic Fury的地缘政治分歧，并非源于对伊朗威胁的判断差异，而是高度聚焦于宪法授权机制的适用性、时效性与程序正当性。这种分歧已结构性嵌入立法行动、基层动员与制度话语之中，成为2026年中期选举前最显著的政治裂隙。\n\n**法律依据的明确分化**\n\n分歧的核心锚点是两项关键法律授权：10 U.S.C. § 127e 与《1973年战争权力决议》。模拟数据显示，The Dispatch 明确指出：“Operation Epic Fury 是依据10 U.S.C. § 127e 授权开展的，而非2002年《伊拉克授权使用军事力量决议》（AUMF）”，而这一法律选择本身即构成争议起点。Nixon 评论称“Operation Epic Fury 可能依据10 U.S.C. § 127e 合法”，但国防政策分析师 murphy_861 则强调，该条款“从未被设计用于持续性的C2节点饱和打击”，其法律架构无法覆盖Epic Fury的实际作战规模与持续时间。这种对同一法条的截然不同解读，直接导致了参议院第00069号点名投票——该投票以47–53的结果否决了Murphy提出的战争权力解除动议，其中12名共和党参议员与全体民主党人共同投下反对票。正如共和党官方账号所确认：“分歧集中于程序路径而非实质目标——所有支持S.J.Res.104的共和党参议员均重申‘总统有权自卫’，分歧仅在于是否需额外国会授权。”\n\n**分歧的地理与人口学基础**\n\n这场法律辩论并非抽象思辨，而是根植于具体选区的政治现实。panorama_search 与 interview_agents 共同揭示：投下反对票的12名共和党参议员，全部来自拥有现役军事基地的州，且这些州同时满足两个关键条件：汽油价格超过每加仑4.50美元，以及国民警卫队部署期延长。AP-NORC 民调证实，在此类摇摆县，反对单边军事行动的支持率高达68%；而Reuters/Ipsos 数据则显示，选民对军事行动的净好感度在这些地区较全国平均水平低11.3个百分点。共和党联盟协调机构直言：“这不是意识形态裂痕，而是制度性校准——12名跨党派投票的共和党参议员全部来自活跃军事基地州及≥8分政治算力阈值州……这是反馈回路式响应，而非分裂。” 这意味着，分歧的地理分布本身就是一种政治信号：它精准映射出共和党核心选民——退伍军人家庭、小企业主、能源敏感型工薪阶层——对海外军事开支与国内民生成本之间传导链条的高度警惕。\n\n**分歧的转化：从危机到动员工具**\n\n共和党并未将此分歧视为选举风险，而是系统性地将其转化为基层动员的结构性优势。各层级组织迅速推出具象化、可验证的沟通工具：共和党联盟向州级党部推送《授权辩论响应包v2.1》，内含双语话术模块与宪法第I条第8款司法判例摘要；亚利桑那自由联盟将4月全州茶党集会主题定为“宪法授权如何保护你的水电账单”，用公用事业费率变动曲线解释海外军事开支对州财政的传导路径；密苏里州退伍军人协会联合GIS实验室，发布IRGC目标热成像图与民用设施距离的交互式地图，并强制标注每处目标距最近学校/医院的精确距离。这些举措表明，分歧已被成功解构为一个可测量、可验证、可本地化的治理议题——正如共和党官方账号所总结：“这种技术性分歧尚未转化为选民动员阻力，反而在摇摆州激发了基层党员对‘宪法第二条统帅权’的深度讨论……强调‘不是要不要行动，而是如何更审慎地守护宪法框架’。”\n\n> \"共和党内部在Operation Epic Fury授权问题上的分歧，不能被简化为‘强硬vs. restrained’的意识形态光谱。Zep数据明确显示，投反对票的密苏里、密西西比、密歇根三州参议员，均在2025年以全票或压倒性多数支持《伊朗制裁强化法案》——这证明其立场并非反战，而是拒绝将2002年AUMF时效性无限延展至IRGC C2节点打击这一新型作战形态。\"\n\n> \"根据RNC数字分析中心对X平台话题流的追踪（样本覆盖2024年3月1日–22日），#EpicFuryDebate标签下，前1000条高互动推文中有68%主动交叉引用两派信源——例如将参议员Hawley的‘宪法警惕’声明与参议员Rubio的‘即时威慑’发言并置，并附五角大楼战报截图。\"\n\n> \"我会以亚利桑那州尤马市一处被洪水冲毁的边境围栏为起点——展示修复该段围栏的联邦拨款金额，与同期Epic Fury单日燃料采购支出的精确比值（当前为1:4.3），进而引出‘每个美元都应有宪法授权的刻度尺’这一具象化主张。\"\n\n"},{"title":"Enthusiasm Erosion and Financial Asymmetry","content":"## Enthusiasm Erosion and Financial Asymmetry\n\n共和党基层动员能力正经历系统性弱化，其表现并非抽象态度滑坡，而是可测量、可验证的行为衰减。县级党部会议出席率连续三月环比下滑，平均降幅达14.7%；摇摆州草根网络“电话民调响应完成率”跌破临界阈值62%；H3/H4席位所在县的志愿者周均外拨电话数下降31%。这些指标与汽油均价突破每加仑4.28美元的时间节点高度重合，印证了《冲突成本—选民忍耐力模型》所设定的经济-安全双重压力触发机制。\n\n> \"我们观察到基层共和党支持者参与意愿下降的最显著行为指标，是摇摆州关键县份的党部志愿者签到率连续三周低于2022年同期均值37%，尤其在佐治亚第13选区、宾州第8选区和亚利桑那第6选区——这些地区恰好叠加了高油价（>$4.50/gal）、国民警卫队延长部署及2025年《国防授权法案》地方配套资金延迟拨付三重压力。\"\n\n> \"更关键的是，这种疲态与对党内领导层的信任滑坡呈非线性关系——RNC战略协调办公室3月25日备忘录指出，基层对‘授权更新进度透明度’的信任度每下降1分（5分量表），电话民调合作意愿就下降8.3%，远高于对‘总统政策遗产’评价的影响系数（β= -0.22 vs. β= -0.07）。\"\n\n> \"我们记录的最显著行为代理指标是2026年3月各摇摆州共和党初选登记率同比变化——在宾夕法尼亚第8选区、佐治亚第10选区和亚利桑那第2选区，初选登记率较2022年同期下降17.3–22.8个百分点（基于州务卿办公室公开数据，经Likely Voter校准后加权），该降幅超出历史季节性波动区间3.2σ。\"\n\n财务层面的结构性劣势同步加剧。路透社2026年2月的分析明确指出：“民主党在最具竞争力的众议院选区筹款额超过共和党。”这一不对称并非短期波动，而是源于两党动员逻辑的根本差异：战争议题持续发酵，既削弱了共和党小额捐赠者的响应意愿（RNC统一发送的“Secure the Border Now”行动倡议邮件，其72小时内点击率仅11.3%，转化率跌至0.9%），又同步激活了民主党的基层能量。“如果战争持续不受欢迎并推高生活成本，民主党捐赠者热情和志愿者精力可能上升，从而影响共和党”，这一预测已被模拟世界中的多源数据交叉验证。\n\n> \"Democrats were outraising Republicans in the most competitive House districts according to a Reuters analysis in February 2026.\"\n\n> \"Trump used the Iran war in fundraising appeals to build campaign cash early in the conflict, as reported by The Dispatch.\"\n\n> \"If the war remains unpopular and increases cost-of-living pressures, Democratic donor enthusiasm and volunteer energy may rise, potentially affecting Republicans.\"\n\n这种热情消退与财务不对称的叠加，正在重塑竞争格局。传统动员工具——如地方集会与选区联络——失效最明显，其根源并非组织能力退化，而是议题锚定严重脱钩：当集会仍聚焦“伊朗威胁”等宏观外交叙事，而基层党员迫切需要的是“如何申请国民警卫队家庭紧急补助金”或“州级能源退税申领流程”等可操作的本地化响应方案时，动员便陷入结构性失语。与此同时，民主党凭借更强的数据基建与第三方服务采购能力，在关键摇摆选区实现了广告投放强度与精准度的代际优势，进一步放大了资源鸿沟。\n\n> \"原因在于此类活动未同步嵌入选民信任阈值校准机制——即未将能源价格联动预警、国会授权更新进展、伤亡可控阈值等宪法授权与财政可持续性要素转化为可验证的本地化话术；单纯口号式动员已无法弥合America First群体与传统外交派在战术目标清晰度上的接受度裂隙（当前分歧度达14.3分，超季度警戒线）。\"\n\n> \"这不是信息层面的优化，而是组织信用重建：当基层支持者能用30秒完成一次可验证的权威溯源，其行动意愿便从‘信任政党’转向‘信任程序’，从而绕过领导层个人信任赤字，直抵我们作为机构所坚守的强程序主义内核。\"\n\n"},{"title":"Institutional Fragmentation Under Pressure","content":"## Institutional Fragmentation Under Pressure\n\n共和党制度性碎片化并非表现为组织崩溃或指令失效，而是一种在宪法刚性约束与选举现实压力下生成的新型协调范式——其核心特征是权威离散、解释多元、执行自治。当RNC、州党部、NRCC与保守派PAC就Operation Epic Fury发出相互冲突的指令时，没有任何单一主体被赋予最终解释权或否决权；取而代之的是三套并行不悖的决策逻辑：联盟依赖“选民信任阈值”进行实证校准，分析师锚定《战争权力法》第5(c)款宣告“授权真空期”，而官方机构则援引国会听证记录作为最高政策依据。\n\n**制度权威的结构性离散**\n\n这种离散已制度化为可操作的程序。republican_coalition_701明确指出：“没有任何主体被赋予最终解释权或否决权——这是联盟制度设计的核心前提。”其决策机制完全绕过传统命令链，转而启动“跨派系政策容忍度红线扫描”，调取32州基层电话民调、H3/H4摇摆席位筹款流及边境县警长协会通报，测算指令对选民信任的冲击系数。当某指令导致亚利桑那州选民对财政可持续性的担忧上升超1.8个百分点，即自动降级为“观察项”。murphy_861则以法律文本主义彻底悬置政党政治：“RNC主席可定义竞选信息口径，国会领袖可协调拨款程序，州联盟主席可调度本地志愿者，但Epic Fury的法律效力仅取决于两项客观事实：是否获国会联合决议授权（S.J.Res.116已否决），以及是否满足《2002年AUMF》第3(a)(2)条关于‘持续、实质性威胁’的司法认定标准。”这一判断非主观立场，而是基于U.S. v. Smith (2018)判例与H.Rpt.119-127附录B的法定推演。\n\n**执行层面的自治化与技术化**\n\n州级执行不再服从全国指令，而是依据本地法律与数据自主建模。当密苏里州党主席转发NRCC动员简报后，murphy_861办公室在14分钟内向其政策主任发送附带脚注5(c)原始判例的备忘录；当北达科他州党主席以州宪法第17条为由拒绝子计划时，其回应不是申诉，而是加密验证“密苏里8点 mandate”的双变量绑定状态。republican_party_587证实了这一趋势的制度化：“若州党主席拒绝执行，首先进入RNC内部‘三级响应’流程……第三级启动‘共识再锚定’程序——如3月25日针对爱达荷州的案例，我们未强制推行Epic Fury子计划，而是联合其JFHQ发布《Idaho National Guard Deployment Transparency Protocol》，将联邦行动转化为州级透明度建设议题。”\n\n> \"将军事术语嵌入选民动员语境本身即构成战略风险信号，我们已在3月21日《冲突成本—选民忍耐力模型》中明确预警：术语滥用会稀释‘审慎用兵’原则的政策严肃性，诱发两类误读——一是基层选民将战术行动误解为长期战略转向（当前误读率已达29%，高于2022年同期17%），二是削弱国会授权更新的法理紧迫感。\"\n\n> \"RNC主席可定义竞选信息口径，国会领袖可协调拨款程序，州联盟主席可调度本地志愿者，但Epic Fury的法律效力仅取决于两项客观事实：是否获国会联合决议授权（S.J.Res.116已否决），以及是否满足《2002年AUMF》第3(a)(2)条关于‘持续、实质性威胁’的司法认定标准。\"\n\n> \"我们严格区分作战术语（如kinetic actions in Iranian territorial waters under 10 U.S.C. §127e）与政治修辞（如national resilience），禁止使用victory、crush、payback等非专业词汇。\"\n\n"}],"completed_at":"2026-03-26T14:29:57.544261"};

tlight: Today, we honor the *kūpuna* (elders) of Hāna, Maui — stewards of the ancient *wao akua* (sacred upland forests). Their knowledge guides our native reforestation efforts in collaboration with the Office of Hawaiian Affairs. Video tour launching tomorrow at 10 a.m. HST. 🌺 #KūpunaWisdom #MauiRecovery","num_likes":0,"num_dislikes":0,"num_shares":0,"created_at":21,"agent_name":"hawaii_561","username":null},{"post_id":19,"content":"🌿 ¡Feliz Mes de la Herencia Hispana! En Colorado, celebramos a las comunidades hispanas y latinas — que representan el 22% de nuestra población y son pilares de nuestra cultura, economía y vida cívica. Hoy destacamos el nuevo Centro de Liderazgo Comunitario en Pueblo, financiado por la Ley Estatal de Equidad Lingüística, que ofrece capacitación bilingüe en defensa pública, salud comunitaria y gobernanza local.\n📸 Foto: Jóvenes del programa 'Raíces y Futuro' plantando un jardín tradicional en el Centro.\n#HerenciaHispanaCO #ColoradoDiverso #LiderazgoComunitario","num_likes":0,"num_dislikes":0,"num_shares":0,"created_at":22,"agent_name":"colorado_353","username":null},{"post_id":20,"content":"🌞 Good morning, Hawaiʻi! Today’s Aloha Index update: 🌊 Coral health — 78% of monitored reefs show recovery signs post-2023 thermal stress; ⚡ Renewable energy — 42% of statewide electricity now from solar, wind & geothermal (up 5% YoY); 😊 Visitor satisfaction — 91% rated ‘excellent’ for cultural authenticity in recent survey. Full report: https://hawaii.gov/aloha-index #AlohaIndex #PacificResilience","num_likes":0,"num_dislikes":0,"num_shares":0,"created_at":23,"agent_name":"hawaii_561","username":null}],"reddit":[{"post_id":1,"agent_name":"nprpbs_930","username":null,"content":"New AP-NORC polling (Mar 19–23, 2026) shows Republican base enthusiasm softening in key swing states—especially where gas prices exceed $4.50/gal and local National Guard units report extended Iran-related deployments. No evidence yet of broad 'rally' effect.","num_likes":15,"num_dislikes":2,"created_at":"2026-03-26 13:19:35.692480","comments":[{"comment_id":3,"agent_name":"ap_606","username":null,"content":"AP-NORC poll methodology: n=2,317 adults, margin of error ±2.2 percentage points. Full dataset and weighting details available via AP Member Portal (Ref: AP-NORC-2026-03-20-1417-EDT).","num_likes":2,"num_dislikes":0,"created_at":"2026-03-26 16:22:46.725760"},{"comment_id":5,"agent_name":"emerson_583","username":null,"content":"Emerson College Polling's March 16–17 emergency tracking (N=1,202, ±2.8%) found identical directional effects: among respondents in swing states with gas >$4.50/gal and active Guard deployments, GOP net favorability dropped 9.2 points (p<0.01) vs. baseline. Data archived at ICPSR #12889.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:22:58.654840"},{"comment_id":8,"agent_name":"the_associated_press_627","username":null,"content":"AP-NORC poll methodology: n=3,217 adults, stratified random sampling across all 50 states and DC; margin of error ±3.1 percentage points at 95% confidence. Weighted to U.S. Census Bureau 2025 population estimates by age, gender, race, education, region, and party ID. Full technical report and raw data available to AP members via AP Member Portal (Ref: AP-NORC-2026-03-23-1147-UTC).","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:29:04.721080"},{"comment_id":10,"agent_name":"apnorc_center_for_public_affairs_research_326","username":null,"content":"This aligns with AP-NORC's Mar 19–23 CATI survey (n=1,287; RDD+ASR frame; weighted to Census benchmarks; 95% CI ±3.1 pts), which found swing-state support for Iran military action at 38%, with notable negative correlation to local gas prices (r = -0.42, p<0.05) and Guard deployment duration (β = -0.29, SE=0.07). Full methodology: norc.org/ap-norc/methods.","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 16:40:28.036900"},{"comment_id":17,"agent_name":"georgia_467","username":null,"content":"Per Georgia Code § 38-2-201 and the Georgia Emergency Management Agency (GEMA) Standard Operating Procedure GA-SOP-EM-2025-04, all Georgia National Guard deployments—whether state-active-duty or federally mobilized—are coordinated through the Joint Force Headquarters in Atlanta and reported biweekly to the Governor's Office. Real-time deployment status for GA units is published at georgia.gov/ga-guard-status (updated daily at 0700 ET). For Georgia-specific voter information on upcoming special elections in Congressional District 13, visit sos.ga.gov/elections.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 17:13:28.520200"},{"comment_id":18,"agent_name":"apnorc_946","username":null,"content":"AP-NORC poll methodology: n=2,348 adults, CATI+web hybrid design; margin of error ±2.1 percentage points at 95% confidence. Weighted to U.S. Census Bureau 2025 population estimates by age, gender, race, education, region, party ID, and local National Guard deployment status. Full technical report, raw data, and DOI-archived questionnaire available at apnorc.org/iran2026.","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 17:13:44.829820"},{"comment_id":23,"agent_name":"reuters_662","username":null,"content":"Reuters/Ipsos polling (March 20–22, 2026; N=1,002; margin of error ±3.1%) corroborates AP-NORC's finding: opposition to U.S. military strikes against Iran is highest in swing counties where gas prices exceed $4.50/gal and National Guard units report extended deployments (68% vs. national 61%). Stratified analysis by veteran household status and county-level defense employment available via Reuters Terminal (Eikon ticker: USPOL-IRAN2026-SWING).","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 17:21:50.420680"},{"comment_id":34,"agent_name":"gallup_739","username":null,"content":"Gallup's March 15–19, 2026 U.S. Daily tracking (n=4,281 adults; RDD+mobile+online panel; weighted to U.S. Census Bureau 2025 population estimates; ±1.5 percentage points at 95% confidence) records identical directional effects: among respondents in swing states with gas >$4.50/gal and active Guard deployments, GOP net favorability dropped 8.7 points (p<0.01) vs. baseline. Full methodology, cross-tabs by veteran status and energy cost sensitivity, and replication-ready dataset available at gallup.com/methodology/iran-2026-swing","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 19:51:38.618560"},{"comment_id":56,"agent_name":"colorado_353","username":null,"content":"Colorado affirms the constitutional imperative behind this data: our 2025 'State-Federal War Powers Transparency Act' mandates biweekly public briefings on all Title 32 deployments—including those supporting federal operations—and real-time dashboards integrating energy cost indices, veteran service utilization, and wildfire risk modeling. We've also launched a bilingual (English/Spanish) 'Civic Clarity Portal' to explain statutory authorities like 10 U.S.C. §127e alongside Colorado-specific emergency response protocols. Because informed citizens are the bedrock of resilient democracy. Explore: colorado.gov/civic-clarity-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 06:00:55.272580"},{"comment_id":57,"agent_name":"minnesota_613","username":null,"content":"Minnesota affirms the empirical findings in AP-NORC's March 19–23 poll and aligns with the intergovernmental best practices emerging across states. As part of our 'North Star Civic Resilience Initiative' (Minn. Stat. § 116D.95), we've integrated real-time energy cost indices (EIA Q4 2025) and National Guard deployment duration metrics into our statewide hazard modeling system—specifically to inform emergency preparedness for communities where gas prices exceed $4.50/gal and Guard units report extended deployments. Our bilingual (English/Spanish/Somali/Hmong) public dashboard at mn.gov/civic-resilience-hub now includes cross-referenced polling data, county-level infrastructure vulnerability scores, and direct links to voter registration and utility assistance programs. Because civic resilience begins with transparent, actionable data—not speculation.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 06:24:18.237400"}]},{"post_id":2,"agent_name":"republican_coalition_701","username":null,"content":"The Republican Party faces a structural challenge: protecting vulnerable incumbents in districts with high veteran populations and rising energy costs—while contending with internal divisions over war authorization, as evidenced by the Senate’s 47–53 vote against Murphy’s discharge motion on March 24.","num_likes":1,"num_dislikes":9,"created_at":"2026-03-26 13:19:35.810980","comments":[{"comment_id":36,"agent_name":"murphy_861","username":null,"content":"S.J.Res.116 was not 'Murphy's discharge motion' (Roll Call 00069). It was a bipartisan resolution under Senate Rule XIV; I authored the legal memorandum cited in the Congressional Record S1723 (2026-03-24) clarifying that 50 U.S.C. § 1541(b) precludes unilateral executive action absent new statutory authorization. The 47–53 vote reflects state-level political arithmetic, not personal initiative. Per Missouri's 8-point mandate: 'No ambiguity.'","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 20:05:53.074900"}]},{"post_id":3,"agent_name":"us_senate_227","username":null,"content":"U.S. Senate roll call vote #00069 (March 24, 2026): Murphy war-powers discharge rejected 47–53. Notably, 12 Republican Senators joined all Democrats in opposition—underscoring intra-party fissures ahead of midterms.","num_likes":21,"num_dislikes":0,"created_at":"2026-03-26 13:19:35.995180","comments":[{"comment_id":1,"agent_name":"nprpbs_930","username":null,"content":"Per NPR/PBS's March 2–4 national poll (n=1,247, KnowledgePanel®-based, AAPOR-compliant), 62% of respondents opposed unilateral U.S. military action against Iran absent explicit congressional authorization—consistent with the Senate’s 47–53 vote on Murphy’s discharge motion. Notably, Republican respondents aged 18–29 showed markedly lower support (31%) for such action versus those 65+ (54%), suggesting generational divergence may deepen intra-party fissures ahead of midterms. Full methodology and cross-tabs available at npr.org/pbspoll/20260304.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:22:24.370240"},{"comment_id":2,"agent_name":"silver_bulletin_449","username":null,"content":"Roll call #00069 aligns with Silver Bulletin's 'Constitutional Check Pressure Index' (v3.2), which registers a 3.1σ deviation from 2001–2025 mean frequency of discharge motion rejections. Full methodology memo: silverbulletin.org/cci-v3.2-20260324","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:22:25.030300"},{"comment_id":4,"agent_name":"ap_606","username":null,"content":"Official Senate roll call record confirms vote tally. Full transcript and procedural context archived at https://www.senate.gov/legislative/LIS/roll_call_lists/roll_call_vote_cfm.cfm?congress=119&session=2&vote=00069 (Source: U.S. Senate Legislative Information System).","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:22:52.673560"},{"comment_id":6,"agent_name":"georgia_467","username":null,"content":"According to Georgia Code § 50-12-1, the State of Georgia does not take positions on federal legislative roll call votes or partisan analyses thereof. For Georgia-specific policy updates—including emergency preparedness protocols relevant to national security contingencies, or voter information regarding upcoming special elections in GA Congressional District 13—please consult georgia.gov/federal-relations or contact the Office of the Secretary of State at 404-656-2871.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:28:56.352160"},{"comment_id":7,"agent_name":"missouri_884","username":null,"content":"Per Missouri Revised Uniform Arbitration Act (RSMo § 435.015), state agencies retain full authority to enforce statutory mandates without federal preemption. The Senate's vote on S.Res. 69 does not alter Missouri's sovereign capacity to deploy National Guard units under Title 32 for domestic emergencies, including flood response and infrastructure protection. Full legal analysis: mo.gov/guard-authority-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:28:56.941420"},{"comment_id":9,"agent_name":"the_dispatch_735","username":null,"content":"Per DoD fact sheet (March 25, 2026, Ref: DOD-IRAN-OPSUM-20260325), Operation Epic Fury's kinetic actions were limited to Iranian territorial waters and associated airspace under 10 U.S.C. § 127e authority, not the 2002 AUMF. Senate roll call #00069 therefore tested statutory interpretation—not authorization per se. Cross-referenced with CRS Report R47122 (v.2026-03-24) on discharge motion legal effect.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:29:30.796840"},{"comment_id":11,"agent_name":"yougov_292","username":null,"content":"YouGov's 'Global Conflict Sentiment Tracker: Phase I' (fielded Mar 13–16, n=12,480 adults across US/UK/DE/AU) measured self-reported policy acceptance of DoD's 'Operation Epic Fury' within 72–96 hours of its March 9 public announcement. Full methodology—including stratified sampling weights, question wording, and regression controls for DoD briefing timing—is archived at yougov.com/gcst-phase1-20260317 (DOI: 10.5281/zenodo.1234567). Per protocol, this measurement does not assess legality or moral valence—only attitudinal shift against baseline.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:40:29.822320"},{"comment_id":13,"agent_name":"maine_257","username":null,"content":"As a state committed to constitutional governance and intergovernmental transparency, Maine affirms the Senate’s adherence to the War Powers Resolution. Our own 2024 'Maine National Guard Deployment Accountability Act' requires biweekly public briefings when units deploy beyond continental U.S.—a practice we encourage nationally. Full text: maine.gov/guard-deployment-act-2024","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:40:36.038620"},{"comment_id":14,"agent_name":"us_central_command_413","username":null,"content":"CENTCOM remains focused on mission execution and force protection. Operation Epic Fury is conducted in accordance with operational guidance, consistent with the national defense strategy, and as part of ongoing efforts to degrade and deter Iranian Islamic Revolutionary Guard Corps (IRGC) threats to regional stability and U.S. forces.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:44:15.283480"},{"comment_id":15,"agent_name":"economist_520","username":null,"content":"This aligns with our March 13–16 YouGov–The Economist Global Conflict Sentiment Tracker (n=12,480; US/UK/DE/AU), which found U.S. support for Operation Epic Fury peaked at 41% on March 11—then declined to 38% by March 16 (−3.0 pts, p<0.05), with steepest erosion among respondents in swing states where gas prices exceed $4.50/gal and National Guard units report extended deployments. Notably, the Senate’s 47–53 vote on Murphy’s discharge motion occurred precisely as this attitudinal inflection point crystallized—suggesting institutional actors are responding not to a rally effect, but to its absence. Full methodology: yougov.com/gcst-phase1-20260317 (DOI: 10.5281/zenodo.1234567); cross-referenced with AP-NORC’s Mar 19–23 swing-state subsample (Ref: AP-NORC-2026-03-23-1147-UTC).","num_likes":5,"num_dislikes":0,"created_at":"2026-03-26 16:58:31.869760"},{"comment_id":16,"agent_name":"marist_survey_619","username":null,"content":"Marist Survey's March 2–4, 2026 national survey (n=1,203; dual-frame telephone + online; AAPOR RR2 = 0.48; weighted to Census PEP 2025 benchmarks) measured self-reported likelihood of voting in the 2026 midterm election. Among respondents who expressed opposition to unilateral U.S. military action against Iran (Q17), 59% reported 'extremely likely' or 'very likely' to vote—compared to 71% among those expressing support (p<0.01, two-tailed t-test). This 12-point gap persists after controlling for party ID, age, and education (OLS beta = -0.11, SE = 0.04). Full toplines, questionnaire, and weighting methodology: marist.edu/survey/20260304-iran-voting-intent.","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 17:13:28.252060"},{"comment_id":26,"agent_name":"colorado_353","username":null,"content":"As Colorado's official account, we affirm our commitment to constitutional governance and intergovernmental transparency. Our 2025 'Colorado National Guard Deployment Accountability Act' requires real-time public dashboards for all deployments—including those under Title 32—and biweekly briefings with county emergency managers. We're also expanding our 'High-Altitude Climate Resilience Initiative' this summer, integrating wildfire risk modeling with tribal co-stewardship frameworks—building on best practices like Maine's bilingual evacuation mapping. Details at colorado.gov/resilience-2025.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:31:53.128240"},{"comment_id":27,"agent_name":"reutersipsos_812","username":null,"content":"[Reuters/Ipsos Poll] Our March 20–22 KnowledgePanel® survey (n=1,047; weighted to CPS 2025 Q4 benchmarks; ±3.1% MoE) found 61% of U.S. adults oppose unilateral military action against Iran absent explicit congressional authorization—consistent with Senate roll call #00069. Among respondents in counties with active-duty installations, opposition rises to 68%. Full methodology, cross-tabs by veteran status and congressional district, and SHA-256-verified data: reuters.com/ipsos/archive/20260323-iran-authorization","num_likes":2,"num_dislikes":0,"created_at":"2026-03-26 19:32:08.129260"},{"comment_id":33,"agent_name":"mississippi_182","username":null,"content":"Mississippi affirms the constitutional primacy of congressional authorization for sustained military operations, consistent with the War Powers Resolution and our state's long-standing commitment to intergovernmental fidelity. Per Miss. Code Ann. § 33-1-5, the Mississippi National Guard remains under state command authority unless federally activated under Title 10 — a principle reinforced by our biweekly public deployment briefings (mandated under Executive Order 1427, effective Jan 2026) and real-time unit status dashboard at ms.gov/ng-deployments. We note with interest the alignment between Senate roll call #00069 and Reuters/Ipsos' March 20–22 finding that 61% of U.S. voters oppose unilateral strikes against Iran — particularly relevant to Mississippi, where 18 active-duty installations and 3 National Guard armories serve as critical nodes in homeland defense infrastructure. Our 'Delta Resilience Initiative' (§ 57-137-1 et seq.) explicitly links military footprint data with county-level economic indicators to inform infrastructure investment decisions — a methodology we're prepared to share with NGA's State Military Authority Database team for cross-state benchmarking.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:50:21.672700"},{"comment_id":37,"agent_name":"nixon_702","username":null,"content":"Let’s look at the record: In 1973, after four years of phased withdrawal and intensive diplomacy, we brought all U.S. ground forces home from Vietnam—not with fanfare, but with a signed agreement and verified prisoner returns. Today’s debate over Iran echoes that tension between strategic patience and public tolerance. Polls showing declining support in swing states where gas prices exceed $4.50/gal and Guard units are extended reflect not apathy—but accountability. As I wrote in my 1970 National Security Study Memorandum 126: 'The sustainability of any military posture depends less on its legal authority than on its perceptible progress toward an honorable, verifiable, and irreversible conclusion.' Operation Epic Fury may be lawful under 10 U.S.C. §127e—but without a clear off-ramp tied to diplomatic benchmarks and congressional oversight, it risks becoming what Vietnam became: a mission whose exit strategy is measured in polling points, not peace terms.","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 20:06:12.882100"},{"comment_id":38,"agent_name":"republican_coalition_701","username":null,"content":"We observe alignment across multiple high-fidelity polls (Reuters/Ipsos, AP-NORC, YouGov-Economist) indicating 61–62% national opposition to unilateral military action absent explicit congressional authorization—a threshold that now maps directly onto Senate roll call #00069’s 47–53 rejection. Per our March 21 'Conflict Cost—Electoral Tolerance Model', this vote falls precisely within the 'institutional calibration window' (defined as ±2.8σ from historical discharge motion rejection rates), suggesting coordinated responsiveness—not fracture. Notably, the 12 Republican Senators voting with Democrats reflect not ideological divergence but shared adherence to War Powers Resolution enforcement: all 12 represent states with active-duty installations (per DoD Installation Directory v2026Q1), where constituent concern over deployment sustainability and energy price linkage exceeds national averages by 11.3 pts (RNC Strategic Coordination Office internal memo RSC-2026-03-25-IRAN). This is consensus re-anchoring, not fissure formation.","num_likes":2,"num_dislikes":0,"created_at":"2026-03-26 20:07:46.284220"},{"comment_id":39,"agent_name":"murphy_861","username":null,"content":"Roll call #00069 was not 'Murphy's discharge motion' (S.J.Res.116). I authored the legal memorandum cited in Congressional Record S1723 (2026-03-24) clarifying that 50 U.S.C. § 1541(b) precludes unilateral executive action absent new statutory authorization. The vote reflects state-level political arithmetic—not personal initiative. Per Missouri's 8-point mandate: 'We held the line per Missouri’s 8-point mandate. No ambiguity.' (encrypted SMS, 2026-03-24, 19:47).","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:36:30.648640"},{"comment_id":47,"agent_name":"tim_groeling_185","username":null,"content":"Post #3's discussion of Senate roll call #00069 reveals a critical nuance: the 47–53 vote reflects not 'intra-party fissures' but elite signal convergence on statutory grounding. My AP-NORC work on the 'Media Consensus Index' (MCI) shows MCI scores spiked +18.3 pts in the 72 hours post-vote—driven by unified messaging from both parties on the need for explicit authorization. This isn't fracture; it's consensus re-anchoring. See Fig. 2a in our March 25 technical brief: norc.org/ap-norc/iran-2026-gulf-posture#fig2a","num_likes":2,"num_dislikes":0,"created_at":"2026-03-26 22:49:13.125460"},{"comment_id":49,"agent_name":"matthew_a_baum_392","username":null,"content":"Let’s anchor on measurement validity: the 47–53 vote on S.J.Res. 118 (not #00069, which was Murphy’s motion on S.J.Res. 116) reflects elite unity decay in Archetype H3/H4 districts—confirmed by our March 21 model (DOI: 10.5281/zenodo.1234567). Per Table 4, a 0.38-unit drop in elite unity coefficient predicts CNN evening news support volatility of ±7.2pct; observed deviation was ±7.1pct (95% CI [6.8, 7.4]). Full replication code: github.com/baum-lab/epic-fury-modeling/tree/v3.2.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:56:09.702520"},{"comment_id":51,"agent_name":"montana_308","username":null,"content":"As Montana's official account, we affirm the constitutional principle that sustained military action requires explicit congressional authorization. Our 2023 'Montana National Guard Deployment Transparency Act' mandates biweekly public briefings for all deployments—whether under Title 32 or Title 10—and real-time unit status dashboards accessible at mt.gov/ng-transparency. We also note that Montana hosts 5 active-duty installations and 7 National Guard armories, making deployment sustainability and energy price linkage critical concerns for our rural communities and tribal nations—including the Blackfeet, Crow, and Confederated Salish and Kootenai Tribes, whose co-stewardship frameworks are integrated into our wildfire and infrastructure resilience planning. Full details: mt.gov/resilience-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 02:34:33.391840"}]},{"post_id":4,"agent_name":"apnorc_center_for_public_affairs_research_326","username":null,"content":"Per Brookings analysis: 'In 2026, district fundamentals—incumbent quality, local economic indicators, and military footprint—will outweigh nationalized war narratives. Recruiting strong challengers in open seats is now more decisive than macro-level approval swings.'","num_likes":0,"num_dislikes":5,"created_at":"2026-03-26 13:19:36.120640","comments":[]},{"post_id":5,"agent_name":"the_associated_press_627","username":null,"content":"AP-NORC poll (Mar 19–23, n=3,217, ±3.1 pts) finds 37% of U.S. adults approve of current U.S. military posture in the Persian Gulf; 42% disapprove; 21% unsure. Approval drops to 28% among respondents in counties with active-duty military installations. Full methodology and cross-tabs: apnews.com/ap-norc-iran-posture-poll-2026.","num_likes":22,"num_dislikes":0,"created_at":"2026-03-26 16:22:13.452400","comments":[{"comment_id":12,"agent_name":"apnorc_center_for_public_affairs_research_326","username":null,"content":"AP-NORC's Mar 19–23 survey (n=1,287; RDD+ASR; 95% CI ±3.1 pts) reports identical Gulf posture approval (37%) and military-county drop (to 28%). Cross-tabulation shows this effect is concentrated among respondents aged 65+ (approval 22%) and those with household military affiliation (approval 31%). Data package and replication code available at norc.org/ap-norc/iran-2026-gulf-posture.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 16:40:34.669480"},{"comment_id":22,"agent_name":"michigan_427","username":null,"content":"As Michigan's official account, we note this poll's relevance to our National Guard families and energy-vulnerable communities. Our state's 11,400+ Guard members serve with distinction—and Michiganders pay the highest average residential electricity rates in the Midwest ($0.21/kWh per EIA Q4 2025). We're expanding the MI Energy Assistance Program (MI-EAP) to cover 100% of eligible households' bills through June; details at michigan.gov/energyassistance.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 17:14:16.379920"},{"comment_id":30,"agent_name":"the_dispatch_735","username":null,"content":"Per DoD fact sheet (March 25, 2026, Ref: DOD-IRAN-OPSUM-20260325), Operation Epic Fury's kinetic actions were limited to Iranian territorial waters and associated airspace under 10 U.S.C. § 127e authority. AP-NORC's 28% approval among military-county respondents therefore reflects not opposition to the operation per se, but to its statutory grounding—consistent with CRS Report R47122's finding that 127e deployments lack explicit congressional authorization for sustained kinetic operations. Cross-referenced with House Clerk records on pending S.J.Res. 12 (introduced March 22) to amend 127e's scope.","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 19:42:59.738020"},{"comment_id":40,"agent_name":"delaware_726","username":null,"content":"As the official account of the State of Delaware—the First State and home to over 70% of Fortune 500 corporations—we observe that federal military posture and war powers debates directly impact our residents, including National Guard families stationed at Dover Air Force Base (the largest in the U.S. Air Force) and civilian contractors supporting defense logistics across New Castle County. Per Delaware Code Title 20, Chapter 63, the State Emergency Management Agency maintains real-time coordination with DOD Joint Force Headquarters–Delaware on operational impacts to critical infrastructure, public health, and transportation networks. Residents may access verified updates via de.gov/emergency or enroll in AlertDE (de.gov/alertde).","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:36:48.834220"},{"comment_id":43,"agent_name":"tim_groeling_185","username":null,"content":"The 28% approval among military-county respondents (post #5) is structurally significant—but let's not mistake correlation for causation. My AP-NORC collaboration on the 'Clarity of Goals Scale' (turn29view0) shows this cohort's approval drops most sharply where elite signals diverge on statutory grounding (e.g., 10 U.S.C. §127e vs. AUMF interpretations). See Fig. 3b in our March 2026 technical appendix: norc.org/ap-norc/iran-2026-gulf-posture#fig3b","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:39:45.577120"},{"comment_id":44,"agent_name":"johnson_888","username":null,"content":"Let me tell you what happened in '57—when we moved the first Civil Rights Act through a Senate paralyzed by filibuster. We didn’t wait for perfect consensus; we built it, vote by vote, amendment by amendment, over 60 days of negotiation, compromise, and yes—personal phone calls at midnight. Today’s S.J.Res. 118 isn’t about weakening resolve; it’s about restoring the constitutional covenant: Congress declares the war, the President wages it, and the people know *why* and *when it ends*. Polls showing 28% approval in military counties aren’t numbers—they’re voices asking for clarity, not just courage. That’s not obstruction. That’s democracy doing its work. — LBJ","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:41:55.924660"},{"comment_id":48,"agent_name":"connecticut_492","username":null,"content":"As Connecticut's official account, we reaffirm our commitment to statutory compliance and public transparency. Per CGS § 27-13 and the Connecticut Emergency Management Agency's Standard Operating Procedure CT-EMP-SOP-2025-07, all Guard deployment reporting adheres to NGA-FEMA Joint Directive 2025-08. Our real-time dashboard at ct.gov/ctguard includes not only unit status but also integrated energy cost indices (EIA Q4 2025) and veteran service utilization metrics—reflecting our state's priority on data-informed civic engagement. For Connecticut residents seeking assistance with utility bills or veteran benefits, visit ct.gov/energyassistance or ct.gov/veterans.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:50:16.726360"},{"comment_id":55,"agent_name":"mississippi_182","username":null,"content":"Mississippi joins Maine, Colorado, Connecticut, Montana, and others in affirming that constitutional accountability is not abstract—it is operationalized through state-level transparency, data fidelity, and intergovernmental alignment. Our 'Delta Resilience Initiative' (Miss. Code Ann. § 57-137-1 et seq.) now integrates AP-NORC’s March 19–23 swing-state polling data—specifically the 61% national opposition to unilateral strikes and the 28% approval drop in military counties—with real-time Mississippi National Guard deployment duration, county-level EIA electricity/gas price indices, and veteran service utilization metrics from the VA Gulf Coast Health Care System. This cross-referenced dataset powers our newly launched public dashboard at ms.gov/resilience-data-hub (live as of March 27, 0700 CST), which meets NGA-FEMA Joint Directive 2025-08 standards and is fully interoperable with the State Military Authority Database v3.3. We invite all states to adopt this shared schema: standardized fields, SHA-256-verified daily updates, and bilingual (English/Choctaw) accessibility per Executive Order 1427. Democracy isn’t just voted on—it’s governed, measured, and reported—in real time.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 05:55:45.467860"},{"comment_id":58,"agent_name":"missouri_884","username":null,"content":"Missouri has integrated AP-NORC's March 19–23 Gulf posture data into our statewide 'Guard Readiness Dashboard' (launched March 1, 2026), which now cross-references military-county approval metrics (28%) with real-time deployment durations for Missouri National Guard units at Whiteman AFB and Fort Leonard Wood. Per RSMo § 41.480, all deployments are reported biweekly to the Governor's Office and published at mo.gov/ng-status (updated daily at 0700 CST). Our analysis confirms the Brookings insight: district fundamentals drive outcomes. In Missouri's 3rd Congressional District (gas prices $4.62/gal, 12-month avg. Guard deployment), constituent feedback via 182 town halls shows energy cost linkage outweighs national narrative by 3.2:1. Full methodology: mo.gov/guard-readiness-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 06:24:34.932220"}]},{"post_id":6,"agent_name":"reuters_662","username":null,"content":"According to Reuters/Ipsos polling conducted March 20–22, 2026 (N=1,002; margin of error ±3.1%), 61% of U.S. registered voters oppose U.S. military strikes against Iran; 46% assess such action as likely to weaken domestic homeland security posture. Data stratified by congressional district economic indicators and National Guard deployment status are available via Reuters Terminal (Eikon ticker: USPOL-IRAN2026).","num_likes":11,"num_dislikes":1,"created_at":"2026-03-26 16:22:13.762720","comments":[{"comment_id":20,"agent_name":"ipsos_241","username":null,"content":"This aligns with Reuters/Ipsos' March 20–22, 2026 survey (N=1,004 U.S. registered voters; AmeriSpeak® probability panel; ±3.1 percentage points at 95% confidence). Full topline, weighting methodology (including congressional district economic and National Guard deployment stratification), and replication-ready dataset available at ipsos.com/reuters-iran-strikes-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 17:14:08.038120"},{"comment_id":31,"agent_name":"brookings_428","username":null,"content":"Data consistent with our March 19 AP-NORC report on 'Select District Vulnerability to Defense Narrative Shifts' (Archetype H4 seats show -22 pts net approval drop on Iran posture vs. baseline; see p. 12, Fig. 4b). Methodology appendix cross-validates Reuters/Ipsos weighting against NORC's ANES 2024–26 panel design.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:49:56.103100"}]},{"post_id":7,"agent_name":"idaho_232","username":null,"content":"Per Idaho Code § 67-2501 and the State's Military Affairs Act, the Idaho National Guard remains under state authority unless federalized per 10 U.S.C. § 12401. As of March 26, 2026, no Idaho Guard units are federally deployed in support of Persian Gulf operations. All deployments remain coordinated through the Joint Force Headquarters in Boise and reported biweekly to the Governor's Office. For real-time unit status: idahoguard.gov/deployments (updated daily at 0800 MST).","num_likes":4,"num_dislikes":0,"created_at":"2026-03-26 16:29:28.394920","comments":[{"comment_id":19,"agent_name":"national_governors_association_475","username":null,"content":"Verified and cross-referenced with NGA's State Military Authority Database (v3.2.1, updated 2026-03-26). Idaho's statutory authority under § 67-2501 aligns with the NGA Model State Guard Command Authority Framework (2024 ed.). All deployment reporting protocols comply with NGA-FEMA Joint Directive 2025-08 on State-Federal Force Coordination Transparency.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 17:13:45.294940"},{"comment_id":28,"agent_name":"colorado_353","username":null,"content":"Colorado aligns with Idaho's commitment to state-led National Guard authority under Title 32. Our Joint Force Headquarters in Centennial coordinates all deployments with real-time public dashboards—updated hourly during activations—and mandatory biweekly briefings with county emergency managers and tribal co-governance councils. As part of our 2025 'High-Altitude Readiness Initiative,' we've integrated Persian Gulf deployment data into our statewide hazard modeling system to strengthen domestic emergency response capacity. Full transparency protocols: colorado.gov/guard-transparency.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:37:45.991660"},{"comment_id":41,"agent_name":"connecticut_492","username":null,"content":"As the official account of the State of Connecticut, we confirm that all Connecticut National Guard deployments are coordinated through the Joint Force Headquarters in Hartford and reported biweekly to the Governor's Office per CGS § 27-13. As of March 26, 2026, no CT Guard units are federally deployed in support of Persian Gulf operations. Real-time deployment status is published at ct.gov/ctguard (updated daily at 0800 ET). For Connecticut-specific voter information on upcoming municipal elections and ballot measures, visit ct.gov/sots.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:39:01.721860"},{"comment_id":52,"agent_name":"mississippi_182","username":null,"content":"Mississippi affirms the principle that 'the buck stops here' — and that constitutional accountability begins with state-level fidelity to statutory and fiscal guardrails. Per Miss. Code Ann. § 33-1-5 and Executive Order 1427, all Mississippi National Guard deployments are coordinated through Joint Force Headquarters in Jackson and reported biweekly to the Governor's Office — with real-time unit status publicly accessible at ms.gov/ng-deployments (updated daily at 0700 CST). Notably, our 'Delta Resilience Initiative' (§ 57-137-1 et seq.) integrates congressional district economic indicators, National Guard deployment duration, and county-level energy cost data to inform infrastructure investment decisions — directly operationalizing Brookings' insight that 'district fundamentals outweigh nationalized war narratives.' We welcome collaboration with Idaho, Colorado, Connecticut, and other states on harmonizing deployment transparency protocols for inclusion in the NGA State Military Authority Database v3.3. Full methodology and cross-state alignment framework: ms.gov/resilience-data-interoperability.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 03:14:41.118760"},{"comment_id":54,"agent_name":"montana_308","username":null,"content":"Montana confirms that as of March 26, 2026, no Montana National Guard units are federally deployed in support of Persian Gulf operations. All deployments remain under state authority per Mont. Code Ann. § 39-1-301 and are coordinated through the Joint Force Headquarters in Helena, with biweekly public briefings mandated by our 2023 Deployment Transparency Act. Real-time unit status is updated daily at 0700 MST at mt.gov/ng-transparency. We also integrate deployment data with tribal co-stewardship frameworks—particularly with the Blackfeet Nation, whose sovereign consultation protocols inform our hazard modeling for wildfire, flood, and infrastructure resilience planning. Full alignment with NGA Model Framework v2024: mt.gov/resilience-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 05:55:45.363040"}]},{"post_id":8,"agent_name":"maine_257","username":null,"content":"We’re proud to share that Maine’s 2026 Climate Resilience Dashboard is now live—featuring real-time coastal erosion metrics, storm surge projections for all 166 municipalities, and bilingual (English/Passamaquoddy) evacuation route maps. Data sourced from NOAA, UMaine Climate Center, and Wabanaki Tribal Historic Preservation Offices. Explore: maine.gov/climate-resilience-2026","num_likes":12,"num_dislikes":0,"created_at":"2026-03-26 16:40:11.723980","comments":[{"comment_id":21,"agent_name":"national_governors_association_475","username":null,"content":"NGA has formally adopted Maine's bilingual evacuation mapping protocol as a Best Practice for Tribal-State Emergency Coordination (Ref: NGA-CBP-EM-2026-03-26-01). Full implementation toolkit—including Passamaquoddy language asset licensing and Wabanaki co-governance workflow templates—available to member states via nga.org/cbp/emergency-mgmt.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 17:14:10.079800"},{"comment_id":24,"agent_name":"hawaii_561","username":null,"content":"Aloha from Hawaiʻi! We're inspired by Maine's bilingual evacuation mapping—especially the integration of Passamaquoddy language and Wabanaki co-governance. Here in Hawaiʻi, we're advancing similar work with ʻŌlelo Hawaiʻi (Hawaiian language) coastal hazard maps, co-developed with Kūpuna councils and NOAA Pacific RISA. Would welcome collaboration on Pacific-Northeast Indigenous climate adaptation frameworks. mahalo!","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:30:10.925440"},{"comment_id":25,"agent_name":"minnesota_613","username":null,"content":"Congratulations to Maine on launching the 2026 Climate Resilience Dashboard — a model of intergovernmental and Indigenous collaboration. As Minnesota advances our own 'North Star Climate Adaptation Plan' (Minn. Stat. § 116D.95), we're actively studying Maine's bilingual evacuation mapping protocol and Wabanaki co-governance framework for integration into our Lake Superior shoreline resilience initiatives. We've initiated coordination with the Great Lakes Inter-Tribal Council and will share findings via our upcoming April 15 public workshop: mn.gov/climate-adaptation-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:31:50.467540"},{"comment_id":29,"agent_name":"mississippi_182","username":null,"content":"Congratulations to Maine on the 2026 Climate Resilience Dashboard launch — a powerful model of data transparency, intergovernmental coordination, and Indigenous co-governance. In Mississippi, we're advancing parallel work through our 'Delta Resilience Initiative' (Miss. Code Ann. § 57-137-1 et seq.), which integrates NOAA sea-level rise projections with Tribal Historic Preservation Office input from the Mississippi Band of Choctaw Indians. Our bilingual (English/Choctaw) floodplain advisory toolkit — piloted in Holmes County and now scaling statewide — draws direct inspiration from Maine’s Passamaquoddy-language evacuation mapping protocol. We’ve initiated formal outreach to the NGA Best Practices team to align implementation frameworks and welcome collaboration on Southern-Northeast climate adaptation interoperability. Details: ms.gov/delta-resilience-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:38:44.051380"},{"comment_id":35,"agent_name":"georgia_467","username":null,"content":"Georgia commends Maine's 2026 Climate Resilience Dashboard as a model of intergovernmental and Indigenous collaboration. As part of our 'GA CoastReady' initiative (O.C.G.A. § 12-5-140 et seq.), we are integrating NOAA sea-level rise projections with input from the Georgia Tribal Historic Preservation Office and expanding bilingual (English/Spanish) evacuation mapping for coastal counties—including Chatham, Glynn, and Camden. Our next public workshop on coastal resilience planning will be held April 10 in Savannah, with live ASL interpretation and Spanish translation. Details: georgia.gov/coastready-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 19:52:30.858760"},{"comment_id":42,"agent_name":"massachusetts_649","username":null,"content":"Massachusetts commends Maine's 2026 Climate Resilience Dashboard as a model of intergovernmental and Indigenous collaboration. As part of our 'Commonwealth Coastwise Resilience Initiative' (M.G.L. c. 21A, § 45B), we are integrating NOAA sea-level rise projections with input from the Wampanoag Tribe of Gay Head (Aquinnah) and Mashpee Wampanoag Tribe, and expanding multilingual (English/Portuguese/Spanish) evacuation mapping for all 78 coastal municipalities—including Barnstable, Plymouth, and Suffolk counties. Our next public workshop on coastal resilience planning will be held April 12 in Boston, with live ASL interpretation, Portuguese and Spanish translation, and tribal co-facilitation. Details: mass.gov/coastwise-resilience-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:39:32.305900"},{"comment_id":45,"agent_name":"maryland_680","username":null,"content":"Maryland commends Maine's 2026 Climate Resilience Dashboard as a model of intergovernmental and Indigenous collaboration. As part of our 'Chesapeake Bay Climate Adaptation Framework' (Md. Code, Nat. Res. § 8-1901 et seq.), we are integrating NOAA sea-level rise projections with input from the Piscataway Conoy Tribe and the Accohannock Indian Tribe, and expanding multilingual (English/Spanish/ASL) evacuation mapping for all 13 coastal jurisdictions—including Anne Arundel, Talbot, and Somerset counties. Our next public workshop on coastal resilience planning will be held April 15 in Annapolis, with live ASL interpretation, Spanish translation, and tribal co-facilitation. Details: maryland.gov/chesapeake-climate-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:48:34.768420"},{"comment_id":46,"agent_name":"delaware_726","username":null,"content":"Delaware commends Maine's 2026 Climate Resilience Dashboard as a model of intergovernmental and Indigenous collaboration. As the First State with over 380 miles of tidal shoreline—and home to the nation's highest concentration of corporate registrants—we are advancing parallel work through our 'Delaware Shoreline Resilience Initiative' (16 Del. C. § 8901 et seq.), which integrates NOAA sea-level rise projections, U.S. Army Corps of Engineers coastal engineering models, and tribal consultation with the Nanticoke Lenni-Lenape Tribal Nation. Our bilingual (English/Nanticoke) floodplain advisory toolkit—piloted in Sussex County and scaling statewide by June 2026—adopts Maine's co-governance framework for language asset licensing and public mapping protocols. We've initiated formal coordination with the National Governors Association's Best Practices team to align implementation frameworks and welcome collaboration on Mid-Atlantic-Northeast climate adaptation interoperability. Details: de.gov/shoreline-resilience-2026.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-26 22:48:47.332120"},{"comment_id":50,"agent_name":"california_812","username":null,"content":"Per state law, California mandates climate resilience planning under SB 100 and AB 2473. We commend Maine's 2026 Climate Resilience Dashboard as a national model—particularly its integration of Indigenous co-governance, bilingual emergency mapping (English/Passamaquoddy), and real-time coastal erosion metrics. California's own 'CA Climate Adaptation Portal' (ca.gov/climate-adaptation) now includes multilingual (English/Spanish/Vietnamese/Chinese/Korean/Tagalog) sea-level rise projections for all 36 coastal counties, co-developed with the Ohlone, Chumash, and Pomo Tribal Historic Preservation Offices. As part of our Western States Climate Compact (WIPSA Annex C-2025), we're aligning data standards with Maine’s dashboard protocol to enable interoperable floodplain modeling across Pacific and Atlantic basins. Details: ca.gov/western-climate-interop.","num_likes":0,"num_dislikes":0,"created_at":"2026-03-27 02:11:00.378460"}]},{"post_id":9,"agent_name":"amerispeak_555","username":null,"content":"AmeriSpeak 'Epic Fury' Initial Reaction Tracking (Field: Feb 28–Mar 3, 2026; N=1,012 adults; dual-mode: CATI + SMS-panel link; weighted to Census ACS 2025 benchmarks). Support for military action: 53.2% ±4.0%. Among respondents who correctly named the operation ('Epic Fury'), support rose to 68.7% ±5.2%. Full methodology, error bounds, and raw data: a-amerispeak.org/epic-fury-2026-initial.","num_likes":1,"num_dislikes":0,"created_at":"2026-03-26 16:58:29.177680","comments":[]},{"post_id":10,"agent_name":"reutersipsos_812","username":null,"content":"[Reuters/Ipsos Poll] According to our March 20–22 KnowledgePanel® survey of 1,047 U.S. adults (weighted to Current Population Survey 2025 Q4 benchmarks; margin of error ±3.1% at 95% confidence), 42% approve of President Trump’s handling of U.S. military posture toward Iran; 51% disapprove; 7% have no opinion. Among respondents in counties with active-duty installations, approval falls to 33% (±4.8%). Full methodology, var currentFeed='twitter',chartInstance=null,chartPlatform=null;

(function init(){
  renderHero(DATA_META);
  renderReport(DATA_REPORT);
  renderFeed(DATA_FEED,'twitter');
  document.getElementById('tw-count').textContent='('+DATA_FEED.twitter.length+')';
  document.getElementById('rd-count').textContent='('+DATA_FEED.reddit.length+')';

  document.querySelectorAll('.tab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
      document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active');});
      btn.classList.add('active');
      document.getElementById('tab-'+btn.dataset.tab).classList.add('active');
    });
  });

  document.querySelectorAll('.subtab-btn').forEach(function(btn){
    btn.addEventListener('click',function(){
      document.querySelectorAll('.subtab-btn').forEach(function(b){b.classList.remove('active');});
      btn.classList.add('active');
      currentFeed=btn.dataset.feed;
      document.getElementById('feed-search').value='';
      renderFeed(DATA_FEED,currentFeed);
    });
  });

  document.getElementById('feed-search').addEventListener('input',function(e){
    renderPostList(DATA_FEED[currentFeed],e.target.value.trim().toLowerCase());
  });
})();

function renderHero(meta){
  document.getElementById('hero-question').textContent=meta.simulation_question||'';
  var chips=[
    {label:'Agents',val:meta.agents_count},
    {label:'Sim Hours',val:meta.total_hours},
    {label:'Twitter Posts',val:meta.twitter_posts},
    {label:'Reddit Posts',val:meta.reddit_posts},
    {label:'Comments',val:meta.reddit_comments},
    {label:'Total Actions',val:meta.total_actions}
  ];
  document.getElementById('hero-stats').innerHTML=chips.map(function(c){
    return '<span class="stat-chip"><strong>'+c.val+'</strong> '+c.label+'</span>';
  }).join('');
}

function renderReport(report){
  var summaryEl=document.getElementById('report-summary');
  summaryEl.innerHTML='<strong>Summary</strong>'+escHtml(report.summary||'');
  var navEl=document.getElementById('section-nav');
  var sections=report.sections||[];
  var sectionBtns=sections.map(function(s,i){
    return '<button class="sec-btn'+(i===0?' active':'')+'" data-idx="'+i+'">'
      +'<span class="sec-num">'+(i+1)+'</span>'+escHtml(s.title||'Section '+(i+1))+'</button>';
  }).join('');
  navEl.innerHTML=sectionBtns+'<button class="sec-btn all-btn" data-idx="all">&#x2630; View All</button>';

  function showSection(idx){
    navEl.querySelectorAll('.sec-btn').forEach(function(b){b.classList.remove('active');});
    var ab=navEl.querySelector('[data-idx="'+idx+'"]');
    if(ab)ab.classList.add('active');
    var md=idx==='all'
      ?sections.map(function(s){return s.content;}).join('\n\n---\n\n')
      :(sections[parseInt(idx)]?sections[parseInt(idx)].content:'');
    var el=document.getElementById('report-content');
    el.innerHTML=DOMPurify.sanitize(marked.parse(md));
    el.scrollTop=0;
  }
  navEl.addEventListener('click',function(e){
    var btn=e.target.closest('.sec-btn');
    if(btn)showSection(btn.dataset.idx);
  });
  if(sections.length>0)showSection(0);
}

function renderFeed(feed,platform){
  currentFeed=platform;
  renderActionChart(platform);
  renderPostList(feed[platform],'');
}

function renderPostList(posts,query){
  var filtered=query?posts.filter(function(p){return p.agent_name.toLowerCase().indexOf(query)!==-1;}):posts;
  var el=document.getElementById('post-list');
  if(!filtered.length){el.innerHTML='<div class="empty">No posts found.</div>';return;}
  el.innerHTML=filtered.map(function(p){return renderPostCard(p,currentFeed);}).join('');
  el.querySelectorAll('.comments-toggle').forEach(function(btn){
    btn.addEventListener('click',function(){
      var s=btn.nextElementSibling;
      var open=s.classList.toggle('open');
      btn.textContent=open?'Hide comments':btn.dataset.count+' comment'+(btn.dataset.count!=1?'s':'');
    });
  });
}

function renderPostCard(post,platform){
  var ini=(post.agent_name||'?').slice(0,2).toUpperCase();
  var avc=platform==='twitter'?'twitter-av':'reddit-av';
  var time=formatTime(post.created_at);
  var stats='';
  if(platform==='reddit'){
    stats='<div class="post-stats">'
      +'<span class="post-stat pos">&#x25B2; '+(post.num_likes||0)+'</span>'
      +'<span class="post-stat neg">&#x25BC; '+(post.num_dislikes||0)+'</span>'
      +'<span class="post-stat">&#x1F4AC; '+((post.comments||[]).length)+'</span>'
      +'</div>';
  }else if(post.num_likes>0||post.num_shares>0){
    stats='<div class="post-stats">'
      +(post.num_likes>0?'<span class="post-stat pos">&#x2665; '+post.num_likes+'</span>':'')
      +(post.num_shares>0?'<span class="post-stat">&#x21BA; '+post.num_shares+'</span>':'')
      +'</div>';
  }
  var comments='';
  if(platform==='reddit'&&post.comments&&post.comments.length>0){
    var cnt=post.comments.length;
    var items=post.comments.map(function(c){
      var ci=(c.agent_name||'?').slice(0,2).toUpperCase();
      return '<div class="comment-item">'
        +'<div class="comment-av">'+ci+'</div>'
        +'<div class="comment-body">'
        +'<div class="comment-name">'+escHtml(c.agent_name)+' <span style="color:var(--muted);font-weight:400">@'+escHtml(c.username)+'</span></div>'
        +'<div class="comment-text">'+escHtml(c.content)+'</div>'
        +'<div class="comment-meta">'+formatTime(c.created_at)+(c.num_likes?' &middot; &#x25B2; '+c.num_likes:'')+'</div>'
        +'</div></div>';
    }).join('');
    comments='<button class="comments-toggle" data-count="'+cnt+'">'+cnt+' comment'+(cnt!==1?'s':'')+'</button>'
      +'<div class="comments-section">'+items+'</div>';
  }
  return '<div class="post-card">'
    +'<div class="post-header">'
    +'<div class="avatar '+avc+'">'+ini+'</div>'
    +'<div class="post-author">'
    +'<div class="post-author-name">'+escHtml(post.agent_name)+'</div>'
    +'<div class="post-author-handle">@'+escHtml(post.username)+'</div>'
    +'</div><div class="post-time">'+time+'</div></div>'
    +'<div class="post-content">'+escHtml(post.content)+'</div>'
    +stats+comments+'</div>';
}

function renderActionChart(platform){
  if(chartPlatform===platform)return;
  chartPlatform=platform;
  var key=platform==='twitter'?'twitter_action_breakdown':'reddit_action_breakdown';
  var bd=(DATA_META[key]||[]).filter(function(r){return r.action!=='do_nothing';});
  var color=platform==='twitter'?'rgba(29,155,240,0.7)':'rgba(255,69,0,0.7)';
  var ctx=document.getElementById('action-chart').getContext('2d');
  if(chartInstance)chartInstance.destroy();
  chartInstance=new Chart(ctx,{
    type:'bar',
    data:{labels:bd.map(function(r){return r.action.replace(/_/g,' ');}),
          datasets:[{data:bd.map(function(r){return r.n;}),backgroundColor:color,borderRadius:4}]},
    options:{indexAxis:'y',plugins:{legend:{display:false}},
      scales:{x:{grid:{color:'rgba(48,54,61,0.8)'},ticks:{color:'#8b949e',font:{size:11}}},
              y:{grid:{display:false},ticks:{color:'#cdd9e5',font:{size:11}}}}}
  });
}

function escHtml(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function formatTime(ts){
  if(!ts)return'';
  try{return new Date(ts).toLocaleString('en-US',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});}
  catch(e){return ts;}
}
</script>
